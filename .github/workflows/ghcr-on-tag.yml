name: Build and Publish GHCR Images

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    if: github.actor == 'ahmad-dadoush' && github.repository_owner == 'ahmad-dadoush'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: symfony
          POSTGRES_PASSWORD: symfony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U symfony -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://symfony:symfony@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_pgsql, zip
          coverage: none

      - name: Install dependencies
        working-directory: ./app
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        working-directory: ./app
        run: composer test:ci

  publish-images:
    runs-on: ubuntu-latest
    needs: tests
    if: github.actor == 'ahmad-dadoush' && github.repository_owner == 'ahmad-dadoush'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: repo
        run: |
          echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract PHP image metadata
        id: meta_php
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner_lower }}/calendar-php
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_php.outputs.tags }}
          labels: ${{ steps.meta_php.outputs.labels }}

      - name: Extract Nginx image metadata
        id: meta_nginx
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner_lower }}/calendar-nginx
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: ${{ steps.meta_nginx.outputs.tags }}
          labels: ${{ steps.meta_nginx.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish-images
    if: startsWith(github.ref, 'refs/tags/') && github.actor == 'ahmad-dadoush' && github.repository_owner == 'ahmad-dadoush'
    environment:
      name: production

    steps:
      - name: Deploy tagged version on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: TAG_NAME
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${TAG_NAME}/" .env
            else
              echo "IMAGE_TAG=${TAG_NAME}" >> .env
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d
            docker compose --env-file .env -f docker-compose.prod.yml exec -T php php bin/console doctrine:migrations:migrate -n
