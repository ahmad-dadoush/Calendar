services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microlab_php
    working_dir: /var/www/html/app
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql://symfony:symfony@database:5432/app?serverVersion=16&charset=utf8
      MAILER_DSN: smtp://mailpit:1025
    depends_on:
      - database

  nginx:
    image: nginx:1.27-alpine
    container_name: microlab_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: postgres:16-alpine
    container_name: microlab_db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: microlab_mailpit
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  db_data: